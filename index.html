<html lang="pt-BR">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    body { margin: 0; padding: 0; background-color: #0f172a; font-family: 'Outfit', system-ui, sans-serif; overflow-x: hidden; }
    
    /* EFEITO DA TELA DE INTRO (Splash Screen) */
    #splash-screen {
      position: fixed; inset: 0; z-index: 999999;
      background: #0f172a url('intro.png') no-repeat center center;
      background-size: contain; /* Preserva a logo centralizada sem zoom excessivo */
      transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
    }
    .hide-splash { opacity: 0; visibility: hidden; pointer-events: none; }

    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-400px) translateX(20px) scale(0.3); opacity: 0; } }
    .ember { position: absolute; background: #ff5a00; border-radius: 50%; box-shadow: 0 0 10px #ff5a00, 0 0 20px #ff0000; animation: floatUp linear infinite; z-index: 15; pointer-events: none; }
    .badge-3d-wrapper { perspective: 1000px; display: inline-block; }
    .badge-3d { transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.6s ease; filter: grayscale(100%) opacity(0.4) drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); transform-style: preserve-3d; }
    .badge-3d-wrapper:hover .badge-3d { transform: rotateY(18deg) rotateX(10deg) scale(1.4) translateY(-5px); filter: grayscale(0%) opacity(1) drop-shadow(-15px 15px 15px rgba(0,0,0,0.6)); }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  
  <div id="splash-screen"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const iconPaths = {
      "check-circle-2": <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></React.Fragment>,
      "phone": <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
      "mail": <React.Fragment><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></React.Fragment>,
      "file-up": <React.Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></React.Fragment>,
      "info": <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></React.Fragment>,
      "siren": <React.Fragment><path d="M7 12a5 5 0 0 1 5-5v0a5 5 0 0 1 5 5v6H7v-6Z"/><path d="M5 20a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2H5v-2Z"/><path d="M21 12h1"/><path d="M18.5 4.5 18 5"/><path d="M2 12h1"/><path d="M12 2v1"/><path d="m4.929 4.929.707.707"/><path d="M12 12v6"/></React.Fragment>,
      "droplets": <React.Fragment><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 4.09-3.43 5.12-1.57 2.15-1.57 3.22C2 13.5 3.8 15.3 6 15.3Z" /><path d="M15 21.1c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19s-2.29-6.16-2.29-6.16-2.29 4.09-3.43 5.12-1.57 2.15-1.57 3.22c0 2.22 1.8 4.02 4 4.02Z" /></React.Fragment>,
      "fire-extinguisher": <React.Fragment><path d="M15 6.5V3a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v3.5"/><path d="M9 18h8"/><path d="M18 3h-3"/><path d="M11 3a6 6 0 0 0-6 6v11"/><path d="M5 13h4"/><path d="M17 10a4 4 0 0 0-8 0v10a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2Z"/></React.Fragment>,
      "lightbulb": <React.Fragment><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></React.Fragment>,
      "route": <React.Fragment><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></React.Fragment>,
      "clipboard-check": <React.Fragment><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></React.Fragment>,
      "chevron-right": <path d="m9 18 6-6-6-6"/>,
      "chevron-left": <path d="m15 18-6-6 6-6"/>,
      "flame": <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
      "help-circle": <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></React.Fragment>,
      "map-pin": <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></React.Fragment>,
      "search": <React.Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></React.Fragment>,
      "trash-2": <React.Fragment><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></React.Fragment>,
      "file-text": <React.Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></React.Fragment>,
      "responsavel": <React.Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></React.Fragment>,
      "edificacao": <React.Fragment><path d="m12 2-9 4.5L12 11l9-4.5L12 2Z" /><path d="m3 11 9 4.5L21 11" /><path d="m3 16 9 4.5L21 16" /><path d="M12 11v11" /></React.Fragment>,
      "sistemas": <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /><path d="M12 8v.01" /></React.Fragment>
    };

    const Icon = ({ name, className, strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{iconPaths[name]}</svg>
    );

    function App() {
      const [currentStep, setCurrentStep] = useState(1);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
      const [cepLoading, setCepLoading] = useState(false);
      const [uploadedFiles, setUploadedFiles] = useState([]);
      const fileInputRef = useRef(null);

      const [formData, setFormData] = useState({
        nome: '', documento: '', email: '', telefone: '', tipoUso: 'comercial', area: '', pavimentos: '',
        cep: '', logradouro: '', numero: '', bairro: '', cidade: '', uf: '',
        medidas: { extintores: false, hidrantes: false, alarme: false, iluminacao: false, sinalizacao: false, sprinklers: false },
        detalhes: { extintoresAno: '', alarmeMarca: '' }
      });

      // Remove a Intro assim que o React carregar completamente
      useEffect(() => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if(splash) splash.classList.add('hide-splash');
        }, 1800); // Intro aparece por 1.8 segundos
      }, []);

      const maskCpfCnpj = (value) => {
        let v = value.replace(/\D/g, "");
        if (v.length <= 11) {
          v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        } else {
          v = v.replace(/^(\d{2})(\d)/, "$1.$2"); v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3"); v = v.replace(/\.(\d{3})(\d)/, ".$1/$2"); v = v.replace(/(\d{4})(\d)/, "$1-$2");
        }
        return v.substring(0, 18);
      };

      const maskPhone = (value) => {
        let v = value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        return v.substring(0, 15);
      };

      const handleCepChange = async (e) => {
        let v = e.target.value.replace(/\D/g, "").substring(0, 8);
        let formattedCep = v.replace(/(\d{5})(\d)/, "$1-$2");
        setFormData(prev => ({ ...prev, cep: formattedCep }));

        if (v.length === 8) {
          setCepLoading(true);
          try {
            const response = await fetch(`https://viacep.com.br/ws/${v}/json/`);
            const data = await response.json();
            if (!data.erro) setFormData(prev => ({ ...prev, logradouro: data.logradouro, bairro: data.bairro, cidade: data.localidade, uf: data.uf }));
          } catch (error) { console.error(error); } finally { setCepLoading(false); }
        }
      };

      const handleChange = (e) => {
        const { name, value, type, checked } = e.target;
        if (name === 'documento') setFormData(prev => ({ ...prev, documento: maskCpfCnpj(value) }));
        else if (name === 'telefone') setFormData(prev => ({ ...prev, telefone: maskPhone(value) }));
        else if (name === 'cep') handleCepChange(e);
        else if (type === 'checkbox') setFormData(prev => ({ ...prev, medidas: { ...prev.medidas, [name]: checked } }));
        else if (name.startsWith('detalhes_')) {
          const field = name.split('_')[1];
          setFormData(prev => ({ ...prev, detalhes: { ...prev.detalhes, [field]: value } }));
        } else setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleFileSelect = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          const newFiles = Array.from(e.target.files).map(file => ({ id: Math.random().toString(36).substr(2, 9), name: file.name, size: (file.size / 1024 / 1024).toFixed(2), progress: 0, status: 'uploading' }));
          setUploadedFiles(prev => [...prev, ...newFiles]);
          newFiles.forEach(file => {
            let currentProgress = 0;
            const interval = setInterval(() => {
              currentProgress += Math.floor(Math.random() * 20) + 10;
              if (currentProgress >= 100) {
                currentProgress = 100; clearInterval(interval);
                setUploadedFiles(prev => prev.map(f => f.id === file.id ? { ...f, progress: 100, status: 'done' } : f));
              } else setUploadedFiles(prev => prev.map(f => f.id === file.id ? { ...f, progress: currentProgress } : f));
            }, 300);
          });
        }
      };

      const removeFile = (id) => setUploadedFiles(prev => prev.filter(f => f.id !== id));
      const nextStep = () => { setCurrentStep(prev => Math.min(prev + 1, 4)); window.scrollTo({ top: 200, behavior: 'smooth' }); };
      const prevStep = () => setCurrentStep(prev => Math.max(prev - 1, 1));

      const getBase64ImageFromURL = (url) => {
        return new Promise((resolve, reject) => {
          var img = new Image();
          img.setAttribute("crossOrigin", "anonymous");
          img.onload = () => {
            var canvas = document.createElement("canvas");
            canvas.width = img.width; canvas.height = img.height;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = error => reject(error);
          img.src = url;
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (currentStep !== 4) return;
        setIsGeneratingPdf(true);

        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          
          try {
            // Brasão interno preservado (Cloudinary)
            const logoBase64 = await getBase64ImageFromURL("https://res.cloudinary.com/dnymahpi7/image/upload/q_auto/f_auto/v1775335232/Brasao_cbmrs_ql8wfq.png");
            doc.addImage(logoBase64, 'PNG', 93, 10, 24, 24);
          } catch(err) { console.log("Aviso: Logo não carregada no PDF", err); }

          doc.setFont("helvetica", "bold"); doc.setFontSize(14);
          doc.text("CORPO DE BOMBEIROS MILITAR DO RS", 105, 42, null, null, "center");
          doc.setFontSize(11);
          doc.text("REQUERIMENTO TÉCNICO DE VISTORIA - PPCI", 105, 48, null, null, "center");
          doc.setLineWidth(0.5); doc.line(20, 52, 190, 52);

          doc.setFontSize(12); doc.setFont("helvetica", "bold");
          doc.text("1. DADOS DO RESPONSÁVEL LEGAL", 20, 62);
          doc.setFontSize(10); doc.setFont("helvetica", "normal");
          doc.text(`Nome/Razão Social: ${formData.nome.toUpperCase()}`, 20, 70);
          doc.text(`CNPJ/CPF: ${formData.documento}`, 20, 76);
          doc.text(`E-mail: ${formData.email}`, 20, 82);
          doc.text(`Telefone: ${formData.telefone}`, 20, 88);

          doc.setFontSize(12); doc.setFont("helvetica", "bold");
          doc.text("2. CARACTERÍSTICAS DA EDIFICAÇÃO", 20, 100);
          doc.setFontSize(10); doc.setFont("helvetica", "normal");
          doc.text(`Classificação de Risco: ${formData.tipoUso.toUpperCase()}`, 20, 108);
          doc.text(`Área Total: ${formData.area} m²`, 20, 114);
          doc.text(`Pavimentos: ${formData.pavimentos}`, 20, 120);
          doc.text(`Endereço: ${formData.logradouro}, nº ${formData.numero} - Bairro ${formData.bairro}`, 20, 126);
          doc.text(`Cidade/UF: ${formData.cidade}/${formData.uf.toUpperCase()} - CEP: ${formData.cep}`, 20, 132);

          doc.setFontSize(12); doc.setFont("helvetica", "bold");
          doc.text("3. SISTEMAS PREVENTIVOS DECLARADOS", 20, 144);
          doc.setFontSize(10); doc.setFont("helvetica", "normal");
          
          let yPos = 152;
          const sysLabels = { extintores: 'Extintores de Incêndio', hidrantes: 'Sistema de Hidrantes', alarme: 'Alarme Visual/Sonoro', iluminacao: 'Iluminação de Emergência', sinalizacao: 'Sinalização de Rotas', sprinklers: 'Chuveiros Automáticos (Sprinklers)' };
          
          Object.keys(formData.medidas).forEach(key => {
            const hasSys = formData.medidas[key];
            doc.text(`[ ${hasSys ? 'X' : '  '} ] ${sysLabels[key]}`, 20, yPos);
            yPos += 6;
            if(hasSys && key === 'extintores' && formData.detalhes.extintoresAno) { doc.text(`      -> Ano da Recarga: ${formData.detalhes.extintoresAno}`, 20, yPos); yPos += 6; }
            if(hasSys && key === 'alarme' && formData.detalhes.alarmeMarca) { doc.text(`      -> Marca da Central: ${formData.detalhes.alarmeMarca}`, 20, yPos); yPos += 6; }
          });

          yPos += 10;
          doc.setFontSize(9); doc.setFont("helvetica", "italic");
          doc.text("Declaro sob as penas da lei (Art. 299 do Código Penal) que as informações", 20, yPos);
          doc.text("aqui prestadas são verdadeiras e de minha inteira responsabilidade.", 20, yPos + 5);

          const pdfFileName = `Requerimento_PPCI_${formData.documento.replace(/\D/g, '') || 'Oficial'}.pdf`;
          doc.save(pdfFileName);

          const telefoneDestino = "5551986389656";
          const mensagem = `🚨 *NOVO REQUERIMENTO PPCI* 🚨\n\n*Responsável:* ${formData.nome}\n*CNPJ/CPF:* ${formData.documento}\n*Endereço:* ${formData.logradouro}, ${formData.numero} - ${formData.cidade}/${formData.uf}\n*Risco:* ${formData.tipoUso.toUpperCase()} | *Área:* ${formData.area}m²\n\nOlá! Acabei de gerar a emissão do formulário no sistema.\n\n*Estou enviando em anexo a este contato o arquivo PDF gerado com o detalhamento completo.* 🚒`;

          const urlWhatsapp = `https://wa.me/${telefoneDestino}?text=${encodeURIComponent(mensagem)}`;
          
          const novaAba = window.open(urlWhatsapp, '_blank');
          if (!novaAba || novaAba.closed || typeof novaAba.closed == 'undefined') {
             window.location.href = urlWhatsapp;
          }

        } catch (error) {
          console.error("Erro no processamento:", error);
          alert("Ocorreu um erro ao gerar seu protocolo. Tente novamente.");
        }

        setIsGeneratingPdf(false);
        setIsSubmitted(true);
      };

      return (
        <div className="min-h-screen bg-slate-100 text-slate-800 pb-10">
          
          <section className="relative w-full h-[65vh] min-h-[480px] flex items-center justify-center overflow-hidden bg-slate-950 border-b-4 border-red-600">
            {/* Fundo do layout original PRESERVADO */}
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542204637-1834e0046535?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-30 z-0"></div>
            <video autoPlay loop muted playsInline crossOrigin="anonymous" className="absolute inset-0 z-10 opacity-60 mix-blend-screen w-full h-full object-cover">
              <source src="https://player.vimeo.com/external/3115814.sd.mp4?s=db07e6f3322123f8cb20cdccba68b4ef214d0263&profile_id=164&oauth2_token_id=57447761" type="video/mp4" />
            </video>
            <div className="absolute inset-0 bg-gradient-to-b from-slate-950/90 via-slate-900/60 to-slate-100 z-10"></div>
            
            {Array.from({ length: 25 }).map((_, i) => (
              <div key={i} className="ember" style={{ left: `${Math.random() * 100}%`, bottom: `${Math.random() * 30 - 10}%`, width: `${Math.random() * 4 + 2}px`, height: `${Math.random() * 4 + 2}px`, animationDuration: `${Math.random() * 3 + 2}s`, animationDelay: `${Math.random() * 3}s` }} />
            ))}
            
            <div className="relative z-20 text-center px-4 max-w-4xl mx-auto transform -translate-y-8 flex flex-col items-center">
              <div className="relative mb-6 drop-shadow-[0_0_25px_rgba(255,255,255,0.2)]">
                {/* Brasão original PRESERVADO */}
                <img src="https://res.cloudinary.com/dnymahpi7/image/upload/q_auto/f_auto/v1775335232/Brasao_cbmrs_ql8wfq.png" alt="Brasão CBMRS" className="w-24 h-24 md:w-32 md:h-32 object-contain" />
              </div>
              <h1 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-white mb-4 tracking-tight drop-shadow-lg">Emissão de <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">PPCI</span></h1>
              <p className="text-lg md:text-xl text-slate-300 max-w-2xl mx-auto font-light drop-shadow-sm leading-relaxed border-t border-slate-700/50 pt-4">Plataforma Inteligente para Geração de Formulários<br/><span className="text-sm opacity-70">Padrão Técnico de Vistoria do Corpo de Bombeiros</span></p>
            </div>
          </section>

          <main className="relative z-30 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 -mt-24 pb-20">
            <div className="bg-slate-50/90 backdrop-blur-sm rounded-3xl shadow-[0_20px_50px_rgb(0,0,0,0.15)] overflow-hidden border border-slate-200/50 relative">
              <div className="absolute inset-0 pointer-events-none z-0 opacity-[0.25]" style={{ backgroundImage: "url('https://res.cloudinary.com/dnymahpi7/image/upload/w_1200,h_630,c_fill,q_auto,f_auto/v1775534414/logo_make_11_06_2023_117_ytmfxd.jpg')", backgroundSize: "cover", backgroundPosition: "center top", backgroundRepeat: "no-repeat" }}/>
              
              <div className="relative bg-white/60 backdrop-blur-md px-6 md:px-10 py-6 border-b border-slate-200 z-10 shadow-sm">
                <div className="hidden md:flex justify-between items-center w-full mb-2">
                  {[{ step: 1, label: 'Responsável' }, { step: 2, label: 'Edificação' }, { step: 3, label: 'Sistemas' }, { step: 4, label: 'Geração' }].map((s) => (
                    <div key={s.step} className="flex flex-col items-center relative w-1/4">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm z-10 transition-colors duration-300 ${currentStep >= s.step ? 'bg-red-600 text-white shadow-lg shadow-red-500/30' : 'bg-slate-200 text-slate-500'}`}>
                        {currentStep > s.step ? <Icon name="check-circle-2" className="w-5 h-5" strokeWidth={3} /> : s.step}
                      </div>
                      <span className={`mt-2 text-xs font-bold uppercase tracking-wider ${currentStep >= s.step ? 'text-slate-800' : 'text-slate-400'}`}>{s.label}</span>
                      {s.step !== 4 && <div className={`absolute top-5 left-[50%] w-full h-[2px] -z-0 transition-colors duration-500 ${currentStep > s.step ? 'bg-red-500' : 'bg-slate-200'}`}></div>}
                    </div>
                  ))}
                </div>
                <div className="md:hidden flex justify-between items-center text-sm font-bold text-slate-600">
                  <span>Etapa {currentStep} de 4</span>
                  <span className="text-red-600">{currentStep === 1 ? 'Responsável' : currentStep === 2 ? 'Edificação' : currentStep === 3 ? 'Sistemas' : 'Geração'}</span>
                </div>
              </div>

              <form onSubmit={handleSubmit} className="relative p-6 md:p-10 z-10">
                {currentStep === 1 && (
                  <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <div className="flex items-center space-x-4 mb-6 pb-2 border-b border-slate-300/50">
                      <div className="bg-slate-800 p-2.5 rounded-lg shadow-md text-white"><Icon name="responsavel" strokeWidth={1.5} /></div>
                      <div><h3 className="text-xl font-bold text-slate-900 tracking-tight flex items-center">Dados Cadastrais</h3></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/40 backdrop-blur-lg p-6 rounded-2xl border border-white/40 shadow-sm">
                      <div><label className="block text-sm font-bold text-slate-800 mb-2">Razão Social / Nome</label><input type="text" name="nome" value={formData.nome} onChange={handleChange} required className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="Nome completo" /></div>
                      <div><label className="text-sm font-bold text-slate-800 mb-2 flex items-center">CNPJ / CPF</label><input type="text" name="documento" value={formData.documento} onChange={handleChange} required maxLength={18} className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="00.000.000/0000-00"/></div>
                      <div><label className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2"><Icon name="mail" className="w-4 h-4 text-slate-600"/> E-mail Comercial</label><input type="email" name="email" value={formData.email} onChange={handleChange} required className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="contato@empresa.com.br"/></div>
                      <div><label className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-slate-600"/> Celular / WhatsApp</label><input type="tel" name="telefone" value={formData.telefone} onChange={handleChange} required className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="(00) 00000-0000" /></div>
                    </div>
                  </div>
                )}

                {currentStep === 2 && (
                  <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <div className="flex items-center space-x-4 mb-6 pb-2 border-b border-slate-300/50">
                      <div className="bg-slate-800 p-2.5 rounded-lg shadow-md text-white"><Icon name="edificacao" strokeWidth={1.5} /></div>
                      <div><h3 className="text-xl font-bold text-slate-900 tracking-tight">Dimensões e Localização</h3></div>
                    </div>
                    <div className="bg-white/40 backdrop-blur-lg p-6 rounded-2xl border border-white/40 shadow-sm space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                          <label className="text-sm font-bold text-slate-800 mb-2">Grau de Risco</label>
                          <select name="tipoUso" value={formData.tipoUso} onChange={handleChange} className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 cursor-pointer shadow-sm">
                            <option value="residencial">A - Residencial</option><option value="comercial">C - Comercial / Serviços</option><option value="reuniao">F - Local de Reunião</option><option value="industrial">I - Industrial</option>
                          </select>
                        </div>
                        <div><label className="block text-sm font-bold text-slate-800 mb-2">Área Construída (m²)</label><input type="number" name="area" value={formData.area} onChange={handleChange} required className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="Ex: 850" /></div>
                        <div><label className="block text-sm font-bold text-slate-800 mb-2">Qtd. Pavimentos</label><input type="number" name="pavimentos" value={formData.pavimentos} onChange={handleChange} required className="w-full px-5 py-3.5 rounded-xl border-2 border-white focus:ring-0 focus:border-red-500 bg-white/90 text-slate-800 shadow-sm" placeholder="Ex: 3" /></div>
                      </div>
                      <div className="p-4 bg-slate-100/50 rounded-xl border border-slate-200/60 mt-6">
                        <h4 className="text-sm font-extrabold text-slate-700 uppercase mb-4 flex items-center gap-2"><Icon name="map-pin" className="w-4 h-4 text-red-500"/> Busca Automática via CEP</h4>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                          <div className="md:col-span-1 relative"><label className="block text-xs font-bold text-slate-600 mb-1">CEP</label><input type="text" name="cep" value={formData.cep} onChange={handleChange} required maxLength={9} placeholder="00000-000" className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-bold shadow-sm" />{cepLoading && <Icon name="search" className="w-4 h-4 text-slate-400 absolute right-3 top-9 animate-spin" />}</div>
                          <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-600 mb-1">Logradouro (Rua/Av.)</label><input type="text" name="logradouro" value={formData.logradouro} onChange={handleChange} required className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-semibold shadow-sm" /></div>
                          <div className="md:col-span-1"><label className="block text-xs font-bold text-slate-600 mb-1">Número</label><input type="text" name="numero" value={formData.numero} onChange={handleChange} required className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-semibold shadow-sm" /></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                          <div><label className="block text-xs font-bold text-slate-600 mb-1">Bairro</label><input type="text" name="bairro" value={formData.bairro} onChange={handleChange} required className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-semibold shadow-sm" /></div>
                          <div><label className="block text-xs font-bold text-slate-600 mb-1">Cidade</label><input type="text" name="cidade" value={formData.cidade} onChange={handleChange} required className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-semibold shadow-sm" /></div>
                          <div><label className="block text-xs font-bold text-slate-600 mb-1">Estado (UF)</label><input type="text" name="uf" value={formData.uf} onChange={handleChange} required maxLength={2} className="w-full px-4 py-3 rounded-lg border-2 border-white focus:border-red-500 bg-white/90 font-semibold shadow-sm uppercase" /></div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {currentStep === 3 && (
                  <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <div className="flex items-center space-x-4 mb-6 pb-2 border-b border-slate-300/50">
                      <div className="bg-red-600 p-2.5 rounded-lg shadow-md text-white"><Icon name="sistemas" strokeWidth={1.5} /></div>
                      <div><h3 className="text-xl font-bold text-slate-900 tracking-tight">Equipamentos Declarados</h3></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {[{ id: 'extintores', label: 'Extintores', i: 'fire-extinguisher' }, { id: 'hidrantes', label: 'Hidrantes', i: 'droplets' }, { id: 'alarme', label: 'Alarme', i: 'siren' }, { id: 'iluminacao', label: 'Iluminação', i: 'lightbulb' }, { id: 'sinalizacao', label: 'Sinalização', i: 'route' }, { id: 'sprinklers', label: 'Sprinklers', i: 'flame' }].map((item) => {
                        const isChecked = formData.medidas[item.id];
                        return (
                          <div key={item.id} className="flex flex-col">
                            <label className={`relative flex items-center p-4 rounded-xl cursor-pointer transition-all duration-300 border-2 ${isChecked ? 'border-red-500 bg-red-50/90 shadow-md transform scale-[1.02] z-10' : 'border-white/50 bg-white/50 hover:bg-white/80'}`}>
                              <input type="checkbox" name={item.id} checked={isChecked} onChange={handleChange} className="peer sr-only" />
                              <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center ${isChecked ? 'bg-red-500 border-red-500' : 'border-slate-300 bg-white'}`}>{isChecked && <Icon name="check-circle-2" className="w-4 h-4 text-white" />}</div>
                              <div className={`p-2 ml-3 rounded-xl ${isChecked ? 'bg-white text-red-500 shadow-sm' : 'bg-slate-100/90 text-slate-600'}`}><Icon name={item.i} className="w-5 h-5" /></div>
                              <span className="ml-3 text-[14px] font-bold">{item.label}</span>
                            </label>
                            {isChecked && item.id === 'extintores' && (<div className="mt-2 p-3 bg-red-50 rounded-lg ml-2 mr-2"><input type="number" name="detalhes_extintoresAno" value={formData.detalhes.extintoresAno} onChange={handleChange} placeholder="Ano da Última Recarga" className="w-full p-2 rounded text-sm outline-none focus:border-red-500 border border-red-200"/></div>)}
                            {isChecked && item.id === 'alarme' && (<div className="mt-2 p-3 bg-red-50 rounded-lg ml-2 mr-2"><input type="text" name="detalhes_alarmeMarca" value={formData.detalhes.alarmeMarca} onChange={handleChange} placeholder="Marca/Modelo da Central" className="w-full p-2 rounded text-sm outline-none focus:border-red-500 border border-red-200"/></div>)}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {currentStep === 4 && (
                  <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <div className="bg-slate-800/90 backdrop-blur-xl rounded-3xl p-8 border border-slate-700 shadow-xl relative">
                      <div className="flex items-center space-x-4 mb-6">
                        <div className="bg-white/10 p-3 rounded-xl border border-white/20"><Icon name="clipboard-check" className="w-6 h-6 text-white" /></div>
                        <div>
                          <h3 className="text-xl font-bold text-white tracking-tight">Geração e Envio</h3>
                          <p className="text-sm text-slate-300 mt-1">Conferência final e processamento.</p>
                        </div>
                      </div>
                      
                      <div onClick={() => fileInputRef.current.click()} className="bg-slate-900/50 rounded-2xl p-6 text-center hover:border-red-500/50 cursor-pointer group border-2 border-slate-600 border-dashed">
                        <input type="file" multiple ref={fileInputRef} onChange={handleFileSelect} className="hidden" />
                        <div className="bg-slate-800 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-2 border border-slate-600 group-hover:bg-red-500/20"><Icon name="file-up" className="w-5 h-5 text-slate-300 group-hover:text-red-400" /></div>
                        <p className="text-base font-bold text-white mb-1">Adicionar Anexos (Opcional)</p>
                      </div>

                      {uploadedFiles.length > 0 && (
                        <div className="mt-4 space-y-3">
                          {uploadedFiles.map(file => (
                            <div key={file.id} className="bg-slate-900/80 p-2 rounded-xl border border-slate-700 flex justify-between">
                              <div className="flex items-center gap-3 w-full">
                                <Icon name="file-text" className="w-6 h-6 text-red-400" />
                                <div className="flex-1">
                                  <div className="flex justify-between text-xs mb-1"><span className="font-bold text-slate-200">{file.name}</span><span className="text-slate-400">{file.size}MB</span></div>
                                  <div className="w-full bg-slate-700 h-1.5 rounded-full"><div className={`h-full ${file.status === 'done' ? 'bg-green-500' : 'bg-red-500'}`} style={{ width: `${file.progress}%` }}></div></div>
                                </div>
                              </div>
                              <button type="button" onClick={() => removeFile(file.id)} className="ml-4 p-2 text-slate-500 hover:text-red-400"><Icon name="trash-2" className="w-4 h-4" /></button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                <div className={`mt-8 pt-6 border-t border-slate-300/50 flex ${currentStep === 1 ? 'justify-end' : 'justify-between'} items-center`}>
                  {currentStep > 1 && <button type="button" onClick={prevStep} className="px-6 py-3 font-bold hover:bg-slate-200/50 rounded-xl flex gap-2"><Icon name="chevron-left" className="w-5 h-5"/> Voltar</button>}
                  {currentStep < 4 ? <button type="button" onClick={nextStep} className="px-8 py-3.5 bg-slate-800 text-white font-bold rounded-xl flex gap-2">Avançar <Icon name="chevron-right" className="w-5 h-5"/></button>
                  : <button type="submit" disabled={isGeneratingPdf} className="px-10 py-4 bg-green-600 hover:bg-green-700 text-white font-extrabold rounded-xl flex gap-3 shadow-[0_8px_20px_rgba(34,197,94,0.3)] transition-all transform hover:-translate-y-1">
                      {isGeneratingPdf ? 'Processando Documento...' : 'Emitir PDF e Ir pro WhatsApp'}
                      <Icon name="chevron-right" className="w-5 h-5"/>
                    </button>
                  }
                </div>

                {isSubmitted && (
                  <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-300">
                    <div className="w-28 h-28 bg-green-500/20 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(34,197,94,0.4)] border-2 border-green-400 mb-6 relative">
                       <div className="absolute inset-0 bg-green-400 animate-ping rounded-full opacity-20"></div>
                       <Icon name="check-circle-2" className="w-14 h-14 text-green-400 relative z-10" />
                    </div>
                    <h2 className="text-3xl font-extrabold text-white mb-3">Redirecionando...</h2>
                    <p className="text-slate-300 text-lg max-w-md font-medium mb-8 leading-relaxed">
                      O arquivo <b>PPCI.pdf foi processado e baixado.</b><br/><br/>
                      Você está sendo levado ao WhatsApp. <b>Lembre-se de anexar o PDF</b> na conversa com o setor de aprovação!
                    </p>
                    <button type="button" onClick={() => window.location.reload()} className="px-8 py-3 rounded-lg border border-slate-600 text-white hover:bg-slate-800 font-bold">Nova Emissão</button>
                  </div>
                )}
              </form>
            </div>
          </main>

          <footer className="bg-slate-950 text-center py-12 mt-12 text-slate-400 text-sm border-t border-slate-900 relative z-10">
            <div className="flex flex-col items-center justify-center gap-4 mb-4">
               <div className="badge-3d-wrapper"><img src="https://res.cloudinary.com/dnymahpi7/image/upload/q_auto/f_auto/v1775335232/Brasao_cbmrs_ql8wfq.png" alt="Brasão" className="w-16 h-16 object-contain badge-3d" /></div>
              <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">Sistema Emissor - Uso Profissional</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('Falha no SW:', err));
      });
    }
  </script>

  <script>
    // Fallback de Segurança: Garante que a splash screen saia da tela após 4 segundos
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash && !splash.classList.contains('hide-splash')) {
        splash.classList.add('hide-splash');
      }
    }, 4000);
  </script>
</body>
</html>
